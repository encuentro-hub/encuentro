<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>encuentro</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap');

:root {
  --bg: #0e0e0e;
  --bg2: #141414;
  --ink: rgba(255,255,255,0.72);
  --ink2: rgba(255,255,255,0.38);
  --ink3: rgba(255,255,255,0.18);
  --border: rgba(255,255,255,0.1);
  --border2: rgba(255,255,255,0.06);
  --accent: rgba(180,170,255,0.55);
  --accent2: rgba(180,170,255,0.25);
  --mono: 'Courier Prime', monospace;
  --serif: 'EB Garamond', Georgia, serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--mono); background: var(--bg); color: var(--ink); overflow: hidden; height: 100vh; }

#header { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(11,11,11,0.98); border-bottom: 0.5px solid var(--border2); }
#hdr-top { display: flex; align-items: center; justify-content: space-between; height: 52px; padding: 0 20px; border-bottom: 0.5px solid var(--border2); }
#logo { font-family: var(--serif); font-style: italic; font-size: 24px; color: var(--ink); letter-spacing: 0.03em; cursor: pointer; }
#hdr-right { display: flex; align-items: center; gap: 10px; }
.h-pill { font-size: 9px; font-family: var(--mono); padding: 2px 8px; border: 0.5px solid var(--border); color: var(--ink3); cursor: pointer; letter-spacing: 0.04em; border-radius: 3px; background: none; transition: all 0.15s; }
.h-pill:hover { border-color: var(--accent2); color: rgba(180,170,255,0.6); }
.h-pill.on { border-color: rgba(255,255,255,0.28); color: rgba(255,255,255,0.55); background: rgba(255,255,255,0.04); }
#auth-btn { font-size: 11px; font-family: var(--mono); padding: 2px 10px; border: 0.5px solid var(--border); color: var(--ink3); cursor: pointer; letter-spacing: 0.06em; border-radius: 3px; background: none; transition: all 0.15s; }
#auth-btn:hover, #auth-btn.logged { border-color: var(--accent2); color: rgba(180,170,255,0.6); }
#hdr-tags { display: flex; align-items: center; height: 34px; padding: 0 20px; gap: 10px; position: relative; }
#dd-btn { font-size: 9px; font-family: var(--mono); padding: 2px 8px; border: 0.5px solid var(--border); color: var(--ink3); cursor: pointer; letter-spacing: 0.04em; border-radius: 3px; background: none; display: flex; align-items: center; gap: 6px; transition: all 0.15s; }
#dd-btn:hover { border-color: var(--accent2); color: rgba(180,170,255,0.5); }
#dd-btn .arrow { font-size: 8px; transition: transform 0.15s; display: inline-block; }
#dd-btn.open .arrow { transform: rotate(180deg); }
#dd-menu { position: fixed; z-index: 500; background: #111; border: 0.5px solid var(--border); border-radius: 6px; min-width: 190px; display: none; box-shadow: 0 8px 24px rgba(0,0,0,0.6); }
#dd-menu.open { display: block; }
.dd-item { padding: 7px 12px; font-size: 10px; cursor: pointer; letter-spacing: 0.04em; border-bottom: 0.5px solid var(--border2); display: flex; align-items: center; gap: 8px; transition: background 0.1s; color: var(--ink2); font-family: var(--mono); }
.dd-item:first-child { border-radius: 6px 6px 0 0; }
.dd-item:last-child { border-bottom: none; border-radius: 0 0 6px 6px; }
.dd-item:hover { background: rgba(255,255,255,0.05); color: var(--ink); }
.dd-item.active { background: rgba(180,170,255,0.08); color: rgba(180,170,255,0.7); }
.dd-item .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--dc,#555); flex-shrink: 0; }
.dd-item.user-item { border-top: 0.5px dashed rgba(255,255,255,0.08); }
#active-tag-label { font-size: 9px; font-family: var(--mono); color: var(--ink3); display: flex; align-items: center; gap: 5px; flex: 1; overflow: hidden; }
#active-tag-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.clear-btn { cursor: pointer; font-size: 9px; background: none; border: none; font-family: var(--mono); color: var(--ink3); transition: color 0.1s; }
.clear-btn:hover { color: rgba(255,150,150,0.7); }

#canvas { position: fixed; inset: 0; top: 86px; overflow: hidden; background: var(--bg); }
#canvas.grabbing { cursor: crosshair; }
#svg-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
#connect-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }

.vnode { position: absolute; width: 152px; cursor: pointer; user-select: none; z-index: 1; }
.vnode .nbox { border: 0.5px solid var(--border); background: var(--bg2); border-radius: 10px; overflow: hidden; transition: all 0.2s; }
.vnode:hover .nbox { border-color: rgba(255,255,255,0.22); transform: translate(-1px,-1px); }
.vnode.selected .nbox { border-color: rgba(180,170,255,0.5); box-shadow: 0 0 0 1px rgba(180,170,255,0.08); }
.vnode.dim { opacity: 0.1; }
.vnode .ntop { display: none; }
.vnode .nthumb { aspect-ratio: 16/9; position: relative; overflow: hidden; background: #111; border-radius: 8px 8px 0 0; }
.vnode .nthumb img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.88; }
.vnode .nthumb .ascii { display: flex; align-items: center; justify-content: center; height: 100%; font-family: var(--mono); font-size: 9px; color: rgba(255,255,255,0.1); white-space: pre; text-align: center; padding: 4px; }
.vnode .nthumb .play-hint { position: absolute; inset: 0; background: rgba(0,0,0,0.35); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.15s; font-size: 18px; color: rgba(255,255,255,0.6); }
.vnode:hover .play-hint { opacity: 1; }
.vnode .ninfo { padding: 5px 8px 7px; }
.vnode .ntitle { font-family: var(--serif); font-style: italic; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: rgba(255,255,255,0.72); line-height: 1.3; }
.vnode .nauthor { font-size: 8px; margin-top: 2px; color: rgba(255,255,255,0.42); }
.vnode .ntags { display: flex; flex-wrap: wrap; gap: 2px; margin-top: 4px; }
.vnode .ntag { font-size: 7px; padding: 1px 4px; border: 0.5px solid rgba(255,255,255,0.12); color: rgba(255,255,255,0.3); border-radius: 3px; cursor: pointer; transition: all 0.1s; }
.vnode .ntag:hover { border-color: rgba(180,170,255,0.4); color: rgba(180,170,255,0.65); }
.vnode .ntag.user { border-style: dashed; border-color: rgba(180,170,255,0.2); color: rgba(180,170,255,0.38); }

#loading { position: fixed; inset: 0; top: 86px; z-index: 90; background: var(--bg); display: flex; align-items: center; justify-content: center; }
#loading p { font-family: var(--serif); font-style: italic; font-size: 20px; color: var(--ink3); letter-spacing: 0.15em; animation: blink 1.2s step-end infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
#error-toast { position: fixed; top: 82px; left: 50%; transform: translateX(-50%); z-index: 300; padding: 7px 16px; border: 0.5px solid rgba(255,150,150,0.4); background: rgba(20,14,14,0.95); font-size: 10px; letter-spacing: 0.06em; display: none; font-family: var(--mono); color: rgba(255,150,150,0.7); border-radius: 5px; }

#detail-overlay { position: fixed; top: 94px; right: 14px; bottom: 14px; width: 36%; min-width: 320px; z-index: 150; background: rgba(16,14,14,0.96); border: 0.5px solid var(--border); border-radius: 14px; display: flex; flex-direction: column; overflow: hidden; transform: translateX(calc(100% + 28px)); transition: transform 0.25s ease; pointer-events: none; box-shadow: 0 8px 40px rgba(0,0,0,0.7); }
#detail-overlay.open { transform: translateX(0); pointer-events: all; }
#detail-modal { display: flex; flex-direction: column; flex: 1; overflow: hidden; width: 100%; }
#dm-header { padding: 12px 14px 10px; border-bottom: 0.5px solid var(--border2); flex-shrink: 0; }
#dm-title { font-family: var(--serif); font-style: italic; font-size: 16px; color: rgba(255,255,255,0.82); margin: 0 0 3px; line-height: 1.2; }
#dm-meta { font-size: 9px; color: var(--ink3); letter-spacing: 0.05em; }
#dm-close { float: right; font-size: 9px; font-family: var(--mono); color: var(--ink3); cursor: pointer; background: rgba(255,255,255,0.04); border: 0.5px solid var(--border); padding: 2px 7px; border-radius: 4px; margin-top: 1px; transition: all 0.15s; }
#dm-close:hover { color: rgba(255,255,255,0.6); border-color: rgba(255,255,255,0.2); }
#dm-video-wrap { padding: 10px 10px 0; flex-shrink: 0; }
#dm-video { width: 100%; aspect-ratio: 16/9; background: #111; border-radius: 10px; overflow: hidden; display: flex; align-items: center; justify-content: center; position: relative; cursor: pointer; border: 0.5px solid var(--border2); }
#dm-video iframe { width: 100%; height: 100%; border: none; position: absolute; }
#dm-video .dv-preview { position: absolute; inset: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; }
#dm-video .dv-preview img { width: 100%; height: 100%; object-fit: cover; position: absolute; opacity: 0.85; }
#dm-video .dv-play { position: relative; z-index: 2; width: 36px; height: 36px; border: 1px solid rgba(255,255,255,0.28); border-radius: 50%; background: rgba(0,0,0,0.4); color: rgba(255,255,255,0.5); display: flex; align-items: center; justify-content: center; font-size: 12px; transition: all 0.15s; }
#dm-video .dv-preview:hover .dv-play { border-color: rgba(255,255,255,0.6); color: rgba(255,255,255,0.85); }
#dm-cols { display: grid; grid-template-columns: 1fr 1fr 1fr; margin: 8px 10px 0; border: 0.5px solid var(--border2); border-radius: 8px; overflow: hidden; flex-shrink: 0; }
.dm-col { padding: 7px 9px; border-right: 0.5px solid var(--border2); background: rgba(255,255,255,0.01); }
.dm-col:last-child { border-right: none; }
.dm-col-label { font-size: 7px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink3); margin-bottom: 5px; }
.dm-tag { display: inline-block; font-size: 8px; padding: 1px 5px; border: 0.5px solid rgba(255,255,255,0.14); color: rgba(255,255,255,0.38); margin: 1px 1px 1px 0; border-radius: 3px; cursor: pointer; font-family: var(--mono); transition: all 0.1s; }
.dm-tag:hover { border-color: rgba(180,170,255,0.4); color: rgba(180,170,255,0.6); }
.dm-tag.user { border-style: dashed; border-color: rgba(180,170,255,0.2); color: rgba(180,170,255,0.4); }
.dm-tag.mine { border-color: rgba(180,170,255,0.35); color: rgba(180,170,255,0.5); }
.add-tag-row { display: flex; margin-top: 5px; border-radius: 4px; overflow: hidden; }
.add-tag-row input { flex: 1; background: rgba(255,255,255,0.02); border: 0.5px solid var(--border); border-right: none; color: rgba(255,255,255,0.5); font-family: var(--mono); font-size: 8px; padding: 3px 5px; min-width: 0; }
.add-tag-row input:focus { outline: none; border-color: var(--accent2); }
.add-tag-row input::placeholder { color: rgba(255,255,255,0.12); }
.add-tag-row button { background: rgba(180,170,255,0.06); border: 0.5px solid rgba(180,170,255,0.18); color: rgba(180,170,255,0.5); font-family: var(--mono); font-size: 9px; padding: 3px 7px; cursor: pointer; }
.add-tag-row button:hover { background: rgba(180,170,255,0.12); color: rgba(180,170,255,0.8); }
.my-tag-pill { display: inline-flex; align-items: center; gap: 4px; font-size: 8px; padding: 1px 5px; border: 0.5px dashed rgba(180,170,255,0.25); margin: 1px 1px 1px 0; color: rgba(180,170,255,0.45); border-radius: 3px; }
.my-tag-pill .pt { font-size: 8px; cursor: pointer; opacity: 0.5; font-family: var(--mono); background: none; border: none; color: inherit; padding: 0; }
.my-tag-pill .pt:hover { opacity: 1; color: rgba(255,150,150,0.7); }
.save-btn { display: flex; align-items: center; gap: 5px; padding: 3px 0; font-size: 8px; font-family: var(--mono); border: none; background: none; cursor: pointer; width: 100%; letter-spacing: 0.04em; transition: color 0.15s; }
.save-btn.fav { color: rgba(255,150,150,0.38); }
.save-btn.wat { color: rgba(180,170,255,0.32); }
.save-btn.fav:hover, .save-btn.fav.active { color: rgba(255,150,150,0.7); }
.save-btn.wat:hover, .save-btn.wat.active { color: rgba(180,170,255,0.6); }
.save-btn .si { font-size: 11px; }

#dm-body { flex: 1; overflow-y: auto; padding: 10px 12px; }
#dm-body::-webkit-scrollbar { width: 2px; }
#dm-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); }
.q-block { margin-bottom: 14px; }
.q-text { font-family: var(--serif); font-style: italic; font-size: 10px; color: rgba(255,255,255,0.32); border-bottom: 0.5px dashed var(--border2); padding-bottom: 5px; margin-bottom: 7px; line-height: 1.5; }
.comment-item { padding: 6px 0; border-bottom: 0.5px solid rgba(255,255,255,0.04); }
.comment-author { font-size: 8px; color: var(--ink3); margin-bottom: 2px; letter-spacing: 0.06em; }
.comment-text { font-family: var(--serif); font-style: italic; font-size: 11px; color: rgba(255,255,255,0.38); line-height: 1.5; }
.comment-pending { font-size: 8px; color: rgba(255,180,100,0.5); margin-top: 2px; }
.comment-form textarea { width: 100%; background: rgba(255,255,255,0.02); border: 0.5px solid var(--border2); color: rgba(255,255,255,0.5); font-family: var(--mono); font-size: 9px; padding: 5px 7px; resize: none; height: 40px; margin-top: 6px; box-sizing: border-box; border-radius: 5px; }
.comment-form textarea:focus { outline: none; border-color: var(--accent2); }
.comment-form textarea::placeholder { color: rgba(255,255,255,0.12); }
.comment-form-footer { display: flex; align-items: center; margin-top: 4px; }
.anon-check { display: flex; align-items: center; gap: 4px; font-size: 8px; color: var(--ink3); cursor: pointer; }
.comment-submit { margin-left: auto; font-family: var(--mono); font-size: 8px; padding: 2px 10px; border: 0.5px solid var(--border2); background: none; color: var(--ink3); cursor: pointer; letter-spacing: 0.06em; border-radius: 4px; transition: all 0.15s; }
.comment-submit:hover { border-color: var(--accent2); color: rgba(180,170,255,0.5); }
.free-comment-section { margin-top: 12px; padding-top: 10px; border-top: 0.5px dashed var(--border2); }
.free-comment-label { font-size: 7px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink3); margin-bottom: 6px; }
.login-prompt { font-family: var(--serif); font-style: italic; font-size: 11px; color: var(--ink3); padding: 6px 0; }

.modal-bg { position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; }
.modal-bg.open { display: flex; }
.modal { background: #111; border: 0.5px solid var(--border); border-radius: 12px; width: 320px; max-width: 94vw; overflow: hidden; box-shadow: 0 16px 48px rgba(0,0,0,0.8); }
.modal-head { padding: 14px 16px; border-bottom: 0.5px solid var(--border2); }
.modal-head h2 { font-family: var(--serif); font-style: italic; font-size: 18px; color: var(--ink); font-weight: 400; }
.modal-body { padding: 16px; }
.field { margin-bottom: 12px; }
.field label { display: block; font-size: 8px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink3); margin-bottom: 5px; }
.field input { width: 100%; font-family: var(--mono); font-size: 12px; padding: 7px 9px; border: 0.5px solid var(--border); background: rgba(255,255,255,0.02); color: rgba(255,255,255,0.7); border-radius: 5px; }
.field input:focus { outline: none; border-color: var(--accent2); }
.modal-err { font-size: 9px; color: rgba(255,150,150,0.7); min-height: 14px; margin-bottom: 8px; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; }
.modal-actions button { font-family: var(--mono); font-size: 9px; letter-spacing: 0.06em; padding: 6px 14px; border: 0.5px solid var(--border); background: rgba(255,255,255,0.02); color: var(--ink2); cursor: pointer; border-radius: 5px; transition: all 0.15s; }
.modal-actions button:hover { background: rgba(255,255,255,0.06); color: var(--ink); }
.modal-actions button.primary { background: rgba(180,170,255,0.1); border-color: rgba(180,170,255,0.3); color: rgba(180,170,255,0.7); }
.modal-actions button.primary:hover { background: rgba(180,170,255,0.18); color: rgba(180,170,255,0.9); }
.switch-link { font-family: var(--serif); font-style: italic; font-size: 11px; text-align: center; margin-top: 12px; cursor: pointer; color: var(--ink3); transition: color 0.1s; }
.switch-link:hover { color: var(--ink2); }

#profile-view { position: fixed; inset: 0; top: 52px; z-index: 140; background: var(--bg); display: none; flex-direction: column; }
#profile-view.open { display: flex; }
#pv-header { display: flex; align-items: center; justify-content: space-between; height: 38px; padding: 0 16px; border-bottom: 0.5px solid var(--border2); background: rgba(11,11,11,0.98); flex-shrink: 0; }
#pv-user { display: flex; align-items: center; gap: 10px; }
#pv-avatar { width: 24px; height: 24px; border-radius: 50%; background: rgba(180,170,255,0.08); border: 0.5px solid rgba(180,170,255,0.2); display: flex; align-items: center; justify-content: center; font-size: 9px; color: rgba(180,170,255,0.5); flex-shrink: 0; }
#pv-name { font-family: var(--serif); font-style: italic; font-size: 13px; color: var(--ink); }
#pv-count { font-size: 8px; color: var(--ink3); margin-left: 4px; }
#pv-right { display: flex; align-items: center; gap: 8px; }
#pv-privacy-label { font-size: 8px; color: var(--ink3); letter-spacing: 0.06em; }
#pv-privacy-toggle { font-family: var(--mono); font-size: 8px; padding: 2px 9px; border: 0.5px solid var(--border); background: none; color: var(--ink3); cursor: pointer; border-radius: 3px; letter-spacing: 0.06em; transition: all 0.15s; }
#pv-privacy-toggle:hover { border-color: var(--accent2); color: rgba(180,170,255,0.5); }
#pv-privacy-toggle.public { border-color: rgba(180,170,255,0.3); color: rgba(180,170,255,0.55); background: rgba(180,170,255,0.05); }
#pv-share { font-family: var(--mono); font-size: 8px; padding: 2px 9px; border: 0.5px solid var(--border2); background: none; color: var(--ink3); cursor: pointer; border-radius: 3px; transition: all 0.15s; }
#pv-share:hover { color: var(--ink2); }
#pv-back { font-family: var(--mono); font-size: 8px; padding: 2px 9px; border: 0.5px solid var(--border); background: none; color: var(--ink3); cursor: pointer; border-radius: 3px; letter-spacing: 0.06em; transition: all 0.15s; }
#pv-back:hover { color: var(--ink2); border-color: rgba(255,255,255,0.2); }
#pv-tabs { display: flex; border-bottom: 0.5px solid var(--border2); flex-shrink: 0; background: rgba(11,11,11,0.97); }
.pv-tab { flex: 1; max-width: 180px; padding: 7px 16px; font-size: 9px; font-family: var(--mono); letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; color: var(--ink3); border: none; background: none; border-bottom: 1px solid transparent; transition: all 0.15s; }
.pv-tab:hover { color: var(--ink2); }
.pv-tab.on { color: rgba(255,255,255,0.6); border-bottom-color: rgba(255,255,255,0.3); }
#pv-canvas-wrap { flex: 1; position: relative; overflow: hidden; background: var(--bg); }
#pv-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
#pv-empty { position: absolute; inset: 0; display: none; align-items: center; justify-content: center; font-family: var(--serif); font-style: italic; font-size: 18px; color: var(--ink3); letter-spacing: 0.1em; }

#hud { position: fixed; bottom: 16px; left: 14px; z-index: 100; display: flex; flex-direction: column; gap: 3px; }
#hud button { width: 26px; height: 26px; border: 0.5px solid rgba(255,255,255,0.3); background: rgba(11,11,11,0.9); font-family: var(--mono); font-size: 13px; cursor: pointer; color: rgba(255,255,255,0.6); border-radius: 5px; transition: all 0.15s; }
#hud button:hover { border-color: var(--accent2); color: rgba(180,170,255,0.55); }
#btn-connect { display: none; }
#btn-connect.visible { display: flex; align-items: center; justify-content: center; }
#btn-connect.active { border-color: rgba(180,170,255,0.4); color: rgba(180,170,255,0.65); background: rgba(180,170,255,0.05); }
#status { position: fixed; bottom: 16px; right: 16px; z-index: 100; font-size: 8px; letter-spacing: 0.06em; text-align: right; line-height: 1.9; color: var(--ink3); }

body.connect-mode #canvas { cursor: crosshair; }
body.connect-mode .vnode { cursor: crosshair; }
body.connect-mode .vnode:hover .nbox { outline: 1.5px dashed rgba(180,170,255,0.4); outline-offset: 2px; }
.vnode.connect-origin .nbox { outline: 2px solid rgba(180,170,255,0.6) !important; outline-offset: 3px; }

#connect-popup { position: fixed; z-index: 400; background: #111; border: 0.5px solid var(--accent2); padding: 10px 12px; display: none; flex-direction: column; gap: 7px; min-width: 200px; border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.6); }
#connect-popup.open { display: flex; }
#connect-popup .cp-label { font-size: 8px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink3); }
#connect-popup .cp-pieces { font-size: 10px; font-family: var(--serif); font-style: italic; color: var(--ink2); }
#connect-popup input { font-family: var(--mono); font-size: 10px; padding: 5px 8px; border: 0.5px solid var(--border); background: rgba(255,255,255,0.02); color: rgba(255,255,255,0.6); border-radius: 4px; }
#connect-popup input:focus { outline: none; border-color: var(--accent2); }
#connect-popup .cp-actions { display: flex; gap: 6px; }
#connect-popup .cp-actions button { flex: 1; font-family: var(--mono); font-size: 8px; padding: 5px; border: 0.5px solid var(--border); background: rgba(255,255,255,0.02); color: var(--ink2); cursor: pointer; letter-spacing: 0.06em; border-radius: 4px; transition: all 0.1s; }
#connect-popup .cp-actions button:hover { background: rgba(255,255,255,0.06); }
#connect-popup .cp-actions button.primary { background: rgba(180,170,255,0.08); border-color: var(--accent2); color: rgba(180,170,255,0.65); }
#connect-popup .cp-actions button.primary:hover { background: rgba(180,170,255,0.15); color: rgba(180,170,255,0.9); }

@media (max-width:600px) {
  #canvas { top: 86px; }
  #loading { top: 86px; }
  .vnode { width: 130px; }
  #status { display: none; }
  #detail-overlay { right:0;bottom:0;left:0;top:auto;width:100%!important;min-width:0;border-radius:14px 14px 0 0;max-height:85vh;transform:translateY(100%); }
  #detail-overlay.open { transform:translateY(0); }
}
</style>
</head>
<body>

<div id="header">
  <div id="hdr-top">
    <div id="logo" onclick="goHome()">encuentro</div>
    <div id="hdr-right">
      <button id="auth-btn" onclick="handleAuthBtn()">[ entrar ]</button>
    </div>
    <div id="dd-menu"></div>
  </div>
  <div id="hdr-tags">
    <button class="h-pill on" id="tog-official" onclick="toggleLayer('official')">■ oficial</button>
    <button class="h-pill" id="tog-users" onclick="toggleLayer('users')">□ usuarios</button>
    <button id="dd-btn" onclick="toggleDropdown()">filtrar tags <span class="arrow">▾</span></button>
    <div id="active-tag-label">
      <span id="active-tag-text"></span>
      <button class="clear-btn" id="clear-tag-btn" onclick="clearTag()" style="display:none">✕</button>
    </div>
  </div>
</div>

<div id="canvas">
  <svg id="svg-layer" xmlns="http://www.w3.org/2000/svg"></svg>
  <svg id="connect-svg" xmlns="http://www.w3.org/2000/svg"></svg>
</div>
<div id="loading"><p>cargando...</p></div>
<div id="error-toast"></div>

<div id="hud">
  <button onclick="zoom(1.15)">+</button>
  <button onclick="zoom(0.87)">−</button>
  <button onclick="resetView()" style="font-size:9px">[ ]</button>
  <button id="btn-connect" onclick="toggleConnectMode()" title="Conectar vídeos">⊕</button>
</div>
<div id="status"><span id="st-pieces">0</span> piezas // <span id="st-otags">0</span> tags // <span id="st-utags">0</span> tags usuarios</div>

<div id="connect-popup">
  <div class="cp-label">conectar</div>
  <div class="cp-pieces" id="cp-pieces"></div>
  <input id="cp-tag-input" type="text" placeholder="nombre del tag..." maxlength="40">
  <div class="cp-actions">
    <button onclick="cancelConnect()">cancelar</button>
    <button class="primary" onclick="confirmConnect()">conectar</button>
  </div>
</div>

<div class="modal-bg" id="auth-modal">
  <div class="modal">
    <div class="modal-head"><h2 id="auth-modal-title">entrar</h2></div>
    <div class="modal-body">
      <div class="field"><label>Email</label><input id="auth-email" type="email" placeholder="tu@email.com"></div>
      <div class="field"><label>Contraseña</label><input id="auth-pass" type="password" placeholder="••••••••"></div>
      <div class="modal-err" id="auth-err"></div>
      <div class="modal-actions">
        <button onclick="closeAuthModal()">cancelar</button>
        <button class="primary" id="auth-submit-btn" onclick="submitAuth()">entrar</button>
      </div>
      <div class="switch-link" id="auth-switch" onclick="toggleAuthMode()">¿No tienes cuenta? Regístrate</div>
    </div>
  </div>
</div>

<div id="detail-overlay">
  <div id="detail-modal">
    <div id="dm-header">
      <button id="dm-close" onclick="closeDetail()">✕</button>
      <div id="dm-title"></div>
      <div id="dm-meta"></div>
    </div>
    <div id="dm-video-wrap"><div id="dm-video"></div></div>
    <div id="dm-cols">
      <div class="dm-col">
        <div class="dm-col-label">Tags</div>
        <div id="dm-official-tags"></div>
      </div>
      <div class="dm-col">
        <div class="dm-col-label">Mis tags</div>
        <div id="dm-my-tags"></div>
        <div id="dm-add-tag-row" style="display:none">
          <div class="add-tag-row">
            <input id="dm-tag-input" type="text" placeholder="nuevo tag..." maxlength="40">
            <button onclick="addUserTag()">+</button>
          </div>
        </div>
      </div>
      <div class="dm-col">
        <div class="dm-col-label">Guardar</div>
        <button class="save-btn fav" id="btn-fav" onclick="toggleSave('favorite')"><span class="si">♥</span> favorito</button>
        <button class="save-btn wat" id="btn-watch" onclick="toggleSave('watchlist')"><span class="si">◷</span> ver después</button>
      </div>
    </div>
    <div id="dm-body"></div>
  </div>
</div>

<div id="profile-view">
  <div id="pv-header">
    <div id="pv-user">
      <div id="pv-avatar"></div>
      <span id="pv-name"></span>
      <span id="pv-count"></span>
    </div>
    <div id="pv-right">
      <button id="pv-back" onclick="closeProfile()">← volver</button>
      <span id="pv-privacy-label" style="display:none"></span>
      <button id="pv-privacy-toggle" style="display:none" onclick="togglePrivacy()">privado</button>
      <button id="pv-share" style="display:none" onclick="shareProfile()">compartir ↗</button>
    </div>
  </div>
  <div id="pv-tabs">
    <button class="pv-tab on" onclick="switchProfileTab('favorites')">♥ favoritos</button>
    <button class="pv-tab" onclick="switchProfileTab('watchlist')">◷ ver después</button>
  </div>
  <div id="pv-canvas-wrap">
    <svg id="pv-svg" xmlns="http://www.w3.org/2000/svg"></svg>
    <div id="pv-empty">sin piezas aún</div>
  </div>
</div>

<script>
const API = 'https://encuentro-gony.onrender.com';

const TAG_COLORS=['#b4aaff','#ffcc88','#ffaaaa','#88ddff','#aaffcc','#ffaadd','#ccff88','#ffbb88'];
const tagColorMap={};
function getTagColor(tag){
  if(!tagColorMap[tag]){let h=0;for(let i=0;i<tag.length;i++)h=tag.charCodeAt(i)+((h<<5)-h);tagColorMap[tag]=TAG_COLORS[Math.abs(h)%TAG_COLORS.length];}
  return tagColorMap[tag];
}

const GLYPHS=['◉','◈','▣','◫','◬','◪','◯','⬡'];
const ASCII_THUMBS=['▓░▓░▓░▓\n░ PLAY ░\n▓░▓░▓░▓','▒▒▒▒▒▒▒\nGL1TCH ▒\n▒▒▒▒▒▒▒','░░░░░░░\n LOOP.. \n░░░░░░░','███████\n DATA  █\n███████','▄▄▄▄▄▄▄\nNOISE ▄▄\n▄▄▄▄▄▄▄','▀▀▀▀▀▀▀\nESPEJO ▀\n▀▀▀▀▀▀▀'];
const NODE_W=152,NODE_H=120;
let pieces=[],userTags=[],myTags=[],mySaves=[],questions=[];
let transform={x:80,y:30,scale:1};
let selectedId=null,activeTags=new Set();
let layers={official:true,users:false};
let session=null,authMode='login';
let wasDragging=false,isDraggingNode=false;
let profileTab='favorites',pvTransform={x:40,y:20,scale:1},pvPieces=[];

function tagKey(t,y){return t+'|'+y;}
function isTagActive(t,y){return activeTags.has(tagKey(t,y));}
function toggleActiveTag(t,y){const k=tagKey(t,y);activeTags.has(k)?activeTags.delete(k):activeTags.add(k);}
function clearAllTags(){activeTags.clear();}
function getActiveTags(y){return[...activeTags].filter(k=>k.endsWith('|'+y)).map(k=>k.split('|')[0]);}

async function boot(){
  const saved=localStorage.getItem('enc_session');
  if(saved){try{session=JSON.parse(saved);updateAuthBtn();}catch(e){localStorage.removeItem('enc_session');}}
  const urlParams=new URLSearchParams(window.location.search);
  const profileId=urlParams.get('profile');
  await Promise.all([loadPieces(),loadUserTags(),loadQuestions(),session?loadMyTags():Promise.resolve(),session?loadMySaves():Promise.resolve()]);
  document.getElementById('loading').style.display='none';
  renderAll();
  if(profileId)openProfileById(profileId);
}

async function loadPieces(){
  try{const r=await fetch(`${API}/pieces`);const data=await r.json();pieces=data.map((p,i)=>({...p,ascii:ASCII_THUMBS[i%ASCII_THUMBS.length],x:0,y:0}));layoutPieces();}
  catch(e){showToast('no se pudo conectar con el servidor');}
}

function layoutPieces(){
  if(isMobile()){const cols=2,nW=130,nH=120,gX=16,gY=24,sX=(window.innerWidth-(cols*nW+(cols-1)*gX))/2;pieces.forEach((p,i)=>{p.x=sX+(i%cols)*(nW+gX);p.y=20+Math.floor(i/cols)*(nH+gY);});transform={x:0,y:0,scale:1};}
  else{pieces.forEach((p,i)=>{if(p.x===0&&p.y===0){p.x=80+(i%4)*220+(Math.random()-.5)*50;p.y=60+Math.floor(i/4)*200+(Math.random()-.5)*40;}});}
}

async function loadUserTags(){try{const r=await fetch(`${API}/user-tags/public`);userTags=await r.json();}catch(e){userTags=[];}}
async function loadQuestions(){try{const r=await fetch(`${API}/questions`);questions=await r.json();}catch(e){questions=[];}}

async function refreshSession(){
  if(!session?.refresh_token)return false;
  try{const r=await fetch(`${API}/auth/refresh`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({refresh_token:session.refresh_token})});if(!r.ok)return false;const d=await r.json();session.access_token=d.access_token;session.refresh_token=d.refresh_token;localStorage.setItem('enc_session',JSON.stringify(session));return true;}
  catch(e){return false;}
}

async function fetchWithAuth(url,options={}){
  options.headers={...options.headers,Authorization:`Bearer ${session.access_token}`};
  let r=await fetch(url,options);
  if(r.status===401){const ok=await refreshSession();if(ok){options.headers.Authorization=`Bearer ${session.access_token}`;r=await fetch(url,options);}else{session=null;myTags=[];mySaves=[];localStorage.removeItem('enc_session');updateAuthBtn();return null;}}
  return r;
}

async function loadMyTags(){if(!session)return;try{const r=await fetchWithAuth(`${API}/user-tags/mine`);if(!r)return;myTags=await r.json();if(!Array.isArray(myTags))myTags=[];}catch(e){myTags=[];}}
async function loadMySaves(){if(!session)return;try{const r=await fetchWithAuth(`${API}/saves/mine`);if(!r)return;mySaves=await r.json();if(!Array.isArray(mySaves))mySaves=[];}catch(e){mySaves=[];}}

function renderAll(){renderNodes();renderEdges();renderTagFilter();updateStatus();}

function buildTagMap(list){const m={};if(!Array.isArray(list))return m;list.forEach(t=>{if(!m[t.piece_id])m[t.piece_id]=[];m[t.piece_id].push(t.tag);});return m;}

function renderNodes(){
  const cv=document.getElementById('canvas');cv.querySelectorAll('.vnode').forEach(n=>n.remove());
  const pubMap=buildTagMap(userTags),myMap=buildTagMap(myTags);
  pieces.forEach(p=>{
    const allUT=[...new Set([...(pubMap[p.id]||[]),...(myMap[p.id]||[])])];
    let dim=false;
    if(activeTags.size>0){const oA=getActiveTags('official'),uA=getActiveTags('user');dim=!(oA.length>0&&oA.some(t=>p.tags.includes(t)))&&!(uA.length>0&&uA.some(t=>allUT.includes(t)));}
    else if(selectedId){const sel=pieces.find(x=>x.id===selectedId);if(sel&&p.id!==selectedId){dim=sharedOfficial(p,sel).length===0&&sharedUser(p,sel,buildTagMap([...userTags,...myTags])).length===0;}}
    const el=document.createElement('div');
    el.className='vnode'+(selectedId===p.id?' selected':'')+(dim?' dim':'');
    el.id='node-'+p.id;
    el.style.cssText=`left:${p.x*transform.scale+transform.x}px;top:${p.y*transform.scale+transform.y}px;transform:scale(${transform.scale});transform-origin:top left;z-index:1`;
    const thumb=p.vimeo_thumb?`<img src="${p.vimeo_thumb}" alt=""><div class="play-hint">▶</div>`:`<div class="ascii">${p.ascii||GLYPHS[0]}</div>`;
    let tagsHTML=p.tags.map(t=>`<span class="ntag" onclick="activateTag(event,'${t}','official')">${t}</span>`).join('');
    if(layers.users)tagsHTML+=allUT.map(t=>`<span class="ntag user" onclick="activateTag(event,'${t}','user')">${t}</span>`).join('');
    el.innerHTML=`<div class="nbox"><div class="ntop"><span>${p.author||'—'}</span><span>${p.year||''}</span></div><div class="nthumb">${thumb}</div><div class="ninfo"><div class="ntitle">${p.title}</div><div class="nauthor">${p.author||''}${p.year?' · '+p.year:''}</div><div class="ntags">${tagsHTML}</div></div></div>`;
    el.addEventListener('mousedown',e=>{if(connectMode)return;startDragNode(e,p.id);});
    el.addEventListener('click',e=>{if(connectMode){handleConnectClick(e,p.id);return;}if(!wasDragging)selectPiece(p.id);});
    cv.appendChild(el);
  });
}

function positionNodes(){pieces.forEach(p=>{const el=document.getElementById('node-'+p.id);if(!el)return;el.style.left=(p.x*transform.scale+transform.x)+'px';el.style.top=(p.y*transform.scale+transform.y)+'px';el.style.transform=`scale(${transform.scale})`;});}
function nodeCenter(p){return{x:p.x*transform.scale+transform.x+NODE_W*transform.scale/2,y:p.y*transform.scale+transform.y+NODE_H*transform.scale/2};}
function sharedOfficial(a,b){return a.tags.filter(t=>b.tags.includes(t));}
function sharedUser(a,b,map){const ta=map[a.id]||[],tb=map[b.id]||[];return ta.filter(t=>tb.includes(t));}

function renderEdges(){
  const svg=document.getElementById('svg-layer');svg.innerHTML='';
  const combinedMap=buildTagMap([...userTags,...myTags.filter(t=>!userTags.find(u=>u.id===t.id))]);
  const offActive=getActiveTags('official'),usrActive=getActiveTags('user');
  let pid=0;
  for(let i=0;i<pieces.length;i++){for(let j=i+1;j<pieces.length;j++){
    const a=pieces[i],b=pieces[j],ca=nodeCenter(a),cb=nodeCenter(b);
    const isSel=selectedId&&(selectedId===a.id||selectedId===b.id);
    if(layers.official){const s=sharedOfficial(a,b);if(s.length){const hit=offActive.length>0&&s.some(t=>offActive.includes(t));if(offActive.length>0&&!hit)continue;let op=hit?0.75:(isSel&&activeTags.size===0)?0.75:0.18;drawTagLineMulti(svg,ca,cb,s.map(t=>({tag:t,color:getTagColor(t)})),op,'main',pid++,transform.scale);}}
    if(layers.users){const su=sharedUser(a,b,combinedMap);if(su.length){const hit=usrActive.length>0&&su.some(t=>usrActive.includes(t));if(usrActive.length>0&&!hit)continue;let op=hit?0.75:(isSel&&activeTags.size===0)?0.75:0.18;drawTagLineMulti(svg,ca,cb,su.map(t=>({tag:t,color:'rgba(180,170,255,0.9)'})),op,'main',pid++,transform.scale);}}
  }}
}

function drawTagLineMulti(svg,ca,cb,tagItems,opacity,prefix,uid,scale=1){
  const dx=cb.x-ca.x,dy=cb.y-ca.y,len=Math.sqrt(dx*dx+dy*dy);if(len<10)return;
  const pid=prefix+'ep'+uid;
  const path=document.createElementNS('http://www.w3.org/2000/svg','path');
  path.setAttribute('id',pid);path.setAttribute('d',`M${ca.x},${ca.y} L${cb.x},${cb.y}`);path.setAttribute('fill','none');path.setAttribute('stroke','none');
  svg.appendChild(path);
  if(tagItems.length===1){
    const ti=tagItems[0],reps=Math.max(3,Math.ceil(len/((ti.tag.length+4)*5.5))+2);
    const txt=document.createElementNS('http://www.w3.org/2000/svg','text');
    txt.setAttribute('font-family',"'Courier Prime',monospace");txt.setAttribute('font-size',7*scale);txt.setAttribute('font-weight','700');txt.setAttribute('fill',ti.color);txt.setAttribute('opacity',opacity);txt.setAttribute('letter-spacing','0.5');
    const tp=document.createElementNS('http://www.w3.org/2000/svg','textPath');
    tp.setAttribute('href','#'+pid);tp.setAttribute('startOffset','0');tp.textContent=(ti.tag+'    ').repeat(reps);
    txt.appendChild(tp);svg.appendChild(txt);return;
  }
  const pxC=5.5,gap='    ';
  const units=tagItems.map(ti=>({...ti,unitPx:(ti.tag.length+gap.length)*pxC}));
  const cyclePx=units.reduce((s,u)=>s+u.unitPx,0);
  const reps=Math.max(3,Math.ceil(len/cyclePx)+2);
  let offPx=0;
  units.forEach(ti=>{
    const txt=document.createElementNS('http://www.w3.org/2000/svg','text');
    txt.setAttribute('font-family',"'Courier Prime',monospace");txt.setAttribute('font-size',7*scale);txt.setAttribute('font-weight','700');txt.setAttribute('fill',ti.color);txt.setAttribute('opacity',opacity);txt.setAttribute('letter-spacing','0.5');
    const tp=document.createElementNS('http://www.w3.org/2000/svg','textPath');
    tp.setAttribute('href','#'+pid);tp.setAttribute('startOffset','0');
    const sB=' '.repeat(Math.round(offPx/pxC)),sC=' '.repeat(Math.round((cyclePx-ti.unitPx)/pxC));
    tp.textContent=(sB+ti.tag+sC).repeat(reps+1);
    txt.appendChild(tp);svg.appendChild(txt);offPx+=ti.unitPx;
  });
}

function renderTagFilter(){
  const offTags=[...new Set(pieces.flatMap(p=>p.tags))].sort();
  const uTags=[...new Set([...userTags.map(t=>t.tag),...myTags.map(t=>t.tag)])].sort();
  const menu=document.getElementById('dd-menu');menu.innerHTML='';
  offTags.forEach(t=>{const item=document.createElement('div');item.className='dd-item'+(isTagActive(t,'official')?' active':'');item.innerHTML=`<span class="dot" style="--dc:${getTagColor(t)}"></span>${t}`;item.onclick=()=>{toggleActiveTag(t,'official');updateActiveLabel();renderAll();};menu.appendChild(item);});
  if(layers.users&&uTags.length){uTags.forEach(t=>{const item=document.createElement('div');item.className='dd-item user-item'+(isTagActive(t,'user')?' active':'');item.innerHTML=`<span class="dot" style="--dc:rgba(180,170,255,0.6)"></span>${t} ◌`;item.onclick=()=>{toggleActiveTag(t,'user');updateActiveLabel();renderAll();};menu.appendChild(item);});}
  updateActiveLabel();
}

function updateActiveLabel(){
  const label=document.getElementById('active-tag-text'),cb=document.getElementById('clear-tag-btn');
  if(activeTags.size>0){label.textContent=[...activeTags].map(k=>k.split('|')[0]).join('  ·  ');cb.style.display='inline';}
  else{label.textContent='';cb.style.display='none';}
}

function clearTag(){clearAllTags();updateActiveLabel();renderAll();}
function activateTag(e,tag,type){e.stopPropagation();toggleActiveTag(tag,type);updateActiveLabel();renderAll();}
function filterTag(t,type){toggleActiveTag(t,type);updateActiveLabel();renderAll();}

function toggleDropdown(){
  const btn=document.getElementById('dd-btn'),menu=document.getElementById('dd-menu'),isOpen=menu.classList.contains('open');
  if(!isOpen){const rect=btn.getBoundingClientRect();menu.style.top=(rect.bottom+4)+'px';menu.style.left=rect.left+'px';}
  btn.classList.toggle('open',!isOpen);menu.classList.toggle('open',!isOpen);
}
function closeDropdown(){document.getElementById('dd-btn').classList.remove('open');document.getElementById('dd-menu').classList.remove('open');}
document.addEventListener('click',e=>{if(!e.target.closest('#dd-btn')&&!e.target.closest('#dd-menu'))closeDropdown();});

function toggleLayer(layer){
  layers[layer]=!layers[layer];
  const btn=document.getElementById('tog-'+layer);btn.classList.toggle('on',layers[layer]);btn.textContent=(layers[layer]?'■ ':'□ ')+(layer==='official'?'oficial':'usuarios');
  if(!layers[layer]){[...activeTags].forEach(k=>{if(k.endsWith('|'+layer))activeTags.delete(k);});updateActiveLabel();}
  renderAll();
}

function isMobile(){return window.innerWidth<=600;}

function selectPiece(id){selectedId=selectedId===id?null:id;renderAll();if(selectedId)showDetail(selectedId);}

async function showDetail(id){
  const p=pieces.find(x=>x.id===id);if(!p)return;
  document.getElementById('dm-title').textContent=p.title;
  document.getElementById('dm-meta').textContent='// '+p.author+(p.year?' · '+p.year:'');
  const vimeo=document.getElementById('dm-video');
  if(p.vimeo_thumb){vimeo.innerHTML=`<div class="dv-preview" onclick="loadVimeo(this,'${p.vimeo_url}')"><img src="${p.vimeo_thumb}" alt="${p.title}"><div class="dv-play">▶</div></div>`;}
  else{vimeo.innerHTML=`<div class="dv-preview" onclick="loadVimeo(this,'${p.vimeo_url}')" style="background:#111;position:absolute;inset:0"><div class="dv-play">▶</div></div>`;}
  const myTagsHere=myTags.filter(t=>t.piece_id===id);
  document.getElementById('dm-official-tags').innerHTML=p.tags.map(t=>`<span class="dm-tag" onclick="filterTag('${t}','official')">${t}</span>`).join('');
  renderDmMyTags(id,myTagsHere);
  document.getElementById('dm-add-tag-row').style.display=session?'block':'none';
  document.getElementById('dm-tag-input').value='';
  const isFav=mySaves.some(s=>s.piece_id===id&&s.type==='favorite');
  const isWatch=mySaves.some(s=>s.piece_id===id&&s.type==='watchlist');
  document.getElementById('btn-fav').classList.toggle('active',isFav);
  document.getElementById('btn-watch').classList.toggle('active',isWatch);
  ['btn-fav','btn-watch'].forEach(bid=>{const b=document.getElementById(bid);b.style.opacity=session?'':'0.3';b.style.pointerEvents=session?'':'none';});
  await renderComments(id);
  document.getElementById('detail-overlay').classList.add('open');
}

function renderDmMyTags(pieceId,myTagsHere){
  const c=document.getElementById('dm-my-tags');
  if(!session){c.innerHTML='<span style="font-size:8px;color:rgba(255,255,255,0.18)">entra para añadir</span>';return;}
  c.innerHTML=myTagsHere.map(t=>`<span class="my-tag-pill">${t.tag}<button class="pt" onclick="togglePublishTag('${t.id}',${t.public})">${t.public?'●':'○'}</button><button class="pt" onclick="deleteUserTagDm('${t.id}','${pieceId}')">✕</button></span>`).join('');
}

async function renderComments(pieceId){
  const body=document.getElementById('dm-body');
  body.innerHTML='<div style="font-size:9px;color:rgba(255,255,255,0.15);padding:8px 0">cargando...</div>';
  try{
    const [cR,qR]=await Promise.all([fetch(`${API}/comments/${pieceId}`),fetch(`${API}/questions?piece_id=${pieceId}`)]);
    const comments=await cR.json(),qs=await qR.json();
    let myC=[];if(session){const r=await fetchWithAuth(`${API}/comments/${pieceId}/mine`);if(r)myC=await r.json();}
    let html='';
    if(qs.length){qs.forEach(q=>{
      const qC=comments.filter(c=>c.question_id===q.id),myQC=myC.filter(c=>c.question_id===q.id);
      html+=`<div class="q-block"><div class="q-text">${q.text}</div>${qC.map(c=>`<div class="comment-item"><div class="comment-author">${c.profiles?.display_name||'anónimo'}</div><div class="comment-text">${c.text}</div></div>`).join('')}${myQC.filter(c=>!c.approved).map(c=>`<div class="comment-item"><div class="comment-author">tú</div><div class="comment-text">${c.text}</div><div class="comment-pending">pendiente de aprobación</div></div>`).join('')}${session?`<div class="comment-form">${buildCommentForm(q.id)}</div>`:''}</div>`;
    });}
    const fC=comments.filter(c=>!c.question_id),myFC=myC.filter(c=>!c.question_id);
    html+=`<div class="free-comment-section"><div class="free-comment-label">comentario libre</div>${fC.map(c=>`<div class="comment-item"><div class="comment-author">${c.profiles?.display_name||'anónimo'}</div><div class="comment-text">${c.text}</div></div>`).join('')}${myFC.filter(c=>!c.approved).map(c=>`<div class="comment-item"><div class="comment-author">tú</div><div class="comment-text">${c.text}</div><div class="comment-pending">pendiente</div></div>`).join('')}${session?`<div class="comment-form">${buildCommentForm(null)}</div>`:`<div class="login-prompt">entra para comentar</div>`}</div>`;
    body.innerHTML=html;
  }catch(e){body.innerHTML='<div style="font-size:9px;color:rgba(255,255,255,0.15);padding:8px 0">error al cargar comentarios</div>';}
}

function buildCommentForm(qId){
  return`<textarea placeholder="Tu respuesta..." data-qid="${qId||''}"></textarea><div class="comment-form-footer"><label class="anon-check"><input type="checkbox"> anónimo</label><button class="comment-submit" onclick="submitComment(this,'${qId||''}')">enviar</button></div>`;
}

async function submitComment(btn,questionId){
  if(!session||!selectedId)return;
  const form=btn.closest('.comment-form'),textarea=form.querySelector('textarea'),anonCheck=form.querySelector('input[type=checkbox]');
  const text=textarea.value.trim();if(!text)return;
  try{const r=await fetchWithAuth(`${API}/comments`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({piece_id:selectedId,text,question_id:questionId||null,anonymous:anonCheck?.checked||false})});if(!r)return;if(!r.ok){const d=await r.json();showToast(d.error);return;}textarea.value='';showToast('comentario enviado — pendiente de aprobación');await renderComments(selectedId);}
  catch(e){showToast('error al enviar');}
}

function loadVimeo(el,url){el.parentElement.innerHTML=`<iframe src="${url}?autoplay=1&title=0&byline=0&portrait=0" allow="autoplay; fullscreen" allowfullscreen></iframe>`;}
function closeDetail(){selectedId=null;document.getElementById('detail-overlay').classList.remove('open');renderAll();}
function goHome(){closeDetail();closeProfile();}

async function addUserTag(){
  if(!session||!selectedId)return;
  const input=document.getElementById('dm-tag-input'),tag=input.value.trim().toLowerCase();if(!tag)return;
  try{const r=await fetchWithAuth(`${API}/user-tags`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({piece_id:selectedId,tag})});if(!r)return;const data=await r.json();if(!r.ok){showToast(data.error);return;}myTags.unshift(data);input.value='';renderDmMyTags(selectedId,myTags.filter(t=>t.piece_id===selectedId));renderAll();}
  catch(e){showToast('error al añadir tag');}
}
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&document.activeElement?.id==='dm-tag-input')addUserTag();
  if(e.key==='Enter'&&document.activeElement?.id==='cp-tag-input')confirmConnect();
  if(e.key==='Escape'&&connectMode)cancelConnect();
});

async function togglePublishTag(tagId,isPublic){
  if(!session)return;
  try{const r=await fetchWithAuth(`${API}/user-tags/${tagId}/${isPublic?'unpublish':'publish'}`,{method:'PATCH'});if(!r)return;const data=await r.json();if(!r.ok){showToast(data.error);return;}const idx=myTags.findIndex(t=>t.id===tagId);if(idx!==-1)myTags[idx]=data;await loadUserTags();renderDmMyTags(selectedId,myTags.filter(t=>t.piece_id===selectedId));renderAll();}
  catch(e){showToast('error');}
}

async function deleteUserTagDm(tagId,pieceId){
  if(!session)return;
  try{const r=await fetchWithAuth(`${API}/user-tags/${tagId}`,{method:'DELETE'});if(!r)return;myTags=myTags.filter(t=>t.id!==tagId);await loadUserTags();renderDmMyTags(pieceId,myTags.filter(t=>t.piece_id===pieceId));renderAll();}
  catch(e){showToast('error');}
}

async function toggleSave(type){
  if(!session){openAuthModal();return;}
  const isSaved=mySaves.some(s=>s.piece_id===selectedId&&s.type===type);
  try{
    if(isSaved){const r=await fetchWithAuth(`${API}/saves/${selectedId}/${type}`,{method:'DELETE'});if(!r)return;mySaves=mySaves.filter(s=>!(s.piece_id===selectedId&&s.type===type));}
    else{const r=await fetchWithAuth(`${API}/saves`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({piece_id:selectedId,type})});if(!r)return;const data=await r.json();mySaves.push(data);}
    document.getElementById(type==='favorite'?'btn-fav':'btn-watch').classList.toggle('active',!isSaved);
  }catch(e){showToast('error al guardar');}
}

function handleAuthBtn(){if(session)openProfile(session.user.id,true);else openAuthModal();}

async function openProfile(userId,isOwn=false){
  document.getElementById('profile-view').classList.add('open');
  try{
    const r=await fetch(`${API}/profile/${userId}`);const profile=await r.json();
    const name=profile.display_name||userId.slice(0,8);
    document.getElementById('pv-name').textContent=name;
    document.getElementById('pv-avatar').textContent=name.slice(0,2).toUpperCase();
    const pLabel=document.getElementById('pv-privacy-label'),pToggle=document.getElementById('pv-privacy-toggle'),pShare=document.getElementById('pv-share');
    if(isOwn&&session){pLabel.style.display='block';pToggle.style.display='block';pShare.style.display='block';pToggle.textContent=profile.maps_public?'público':'privado';pToggle.className=profile.maps_public?'public':'';pLabel.textContent=profile.maps_public?'visible':'solo tú';pToggle.dataset.public=profile.maps_public;}
    else{pLabel.style.display='none';pToggle.style.display='none';pShare.style.display='none';}
    let saves=[];
    if(isOwn&&session){const sr=await fetchWithAuth(`${API}/saves/mine`);if(sr)saves=await sr.json();}
    else{const sr=await fetch(`${API}/saves/user/${userId}`);if(sr.ok)saves=await sr.json();}
    const count=saves.filter(s=>s.type==='favorite').length;
    document.getElementById('pv-count').textContent=`· ${count} favorito${count!==1?'s':''}`;
    renderProfileMap(saves);
  }catch(e){showToast('error al cargar perfil');}
}

async function openProfileById(userId){openProfile(userId,false);}

function renderProfileMap(saves){
  const type=profileTab==='favorites'?'favorite':'watchlist';
  const ids=saves.filter(s=>s.type===type).map(s=>s.piece_id);
  pvPieces=pieces.filter(p=>ids.includes(p.id));
  const empty=document.getElementById('pv-empty');
  if(!pvPieces.length){empty.style.display='flex';document.getElementById('pv-svg').innerHTML='';document.getElementById('pv-canvas-wrap').querySelectorAll('.vnode').forEach(n=>n.remove());return;}
  empty.style.display='none';
  pvPieces.forEach((p,i)=>{p.pvx=60+(i%4)*210+(Math.random()-.5)*30;p.pvy=40+Math.floor(i/4)*190+(Math.random()-.5)*30;});
  renderProfileNodes();renderProfileEdges();
}

function renderProfileNodes(){
  const wrap=document.getElementById('pv-canvas-wrap');wrap.querySelectorAll('.vnode').forEach(n=>n.remove());
  pvPieces.forEach(p=>{
    const el=document.createElement('div');el.className='vnode';el.id='pvnode-'+p.id;
    el.style.cssText=`left:${p.pvx*pvTransform.scale+pvTransform.x}px;top:${p.pvy*pvTransform.scale+pvTransform.y}px;transform:scale(${pvTransform.scale});transform-origin:top left;z-index:1`;
    const thumb=p.vimeo_thumb?`<img src="${p.vimeo_thumb}" alt=""><div class="play-hint">▶</div>`:`<div class="ascii">${p.ascii||GLYPHS[0]}</div>`;
    const tagsHTML=p.tags.map(t=>`<span class="ntag">${t}</span>`).join('');
    el.innerHTML=`<div class="nbox"><div class="ntop"><span>${p.author||'—'}</span><span>${p.year||''}</span></div><div class="nthumb">${thumb}</div><div class="ninfo"><div class="ntitle">${p.title}</div><div class="ntags">${tagsHTML}</div></div></div>`;
    el.addEventListener('mousedown',e=>startDragPvNode(e,p));
    el.addEventListener('click',()=>{if(!wasDragging)selectPiece(p.id);});
    wrap.appendChild(el);
  });
}

function startDragPvNode(e,p){
  e.stopPropagation();isDraggingNode=true;wasDragging=false;
  const offX=e.clientX-(p.pvx*pvTransform.scale+pvTransform.x),offY=e.clientY-(p.pvy*pvTransform.scale+pvTransform.y);
  const move=mv=>{wasDragging=true;p.pvx=(mv.clientX-offX-pvTransform.x)/pvTransform.scale;p.pvy=(mv.clientY-offY-pvTransform.y)/pvTransform.scale;const el=document.getElementById('pvnode-'+p.id);if(el){el.style.left=(p.pvx*pvTransform.scale+pvTransform.x)+'px';el.style.top=(p.pvy*pvTransform.scale+pvTransform.y)+'px';}renderProfileEdges();};
  const up=()=>{isDraggingNode=false;document.removeEventListener('mousemove',move);document.removeEventListener('mouseup',up);};
  document.addEventListener('mousemove',move);document.addEventListener('mouseup',up);
}

function renderProfileEdges(){
  const svg=document.getElementById('pv-svg');svg.innerHTML='';
  const combinedMap=buildTagMap([...userTags,...myTags]);
  let pid=0;
  for(let i=0;i<pvPieces.length;i++){for(let j=i+1;j<pvPieces.length;j++){
    const a=pvPieces[i],b=pvPieces[j];
    const ca={x:a.pvx*pvTransform.scale+pvTransform.x+NODE_W*pvTransform.scale/2,y:a.pvy*pvTransform.scale+pvTransform.y+NODE_H*pvTransform.scale/2};
    const cb={x:b.pvx*pvTransform.scale+pvTransform.x+NODE_W*pvTransform.scale/2,y:b.pvy*pvTransform.scale+pvTransform.y+NODE_H*pvTransform.scale/2};
    const s=sharedOfficial(a,b),su=sharedUser(a,b,combinedMap);
    if(s.length)drawTagLineMulti(svg,ca,cb,s.map(t=>({tag:t,color:getTagColor(t)})),0.5,'pv',pid++,pvTransform.scale);
    if(su.length)drawTagLineMulti(svg,ca,cb,su.map(t=>({tag:t,color:'rgba(180,170,255,0.9)'})),0.5,'pv',pid++,pvTransform.scale);
  }}
}

function switchProfileTab(tab){
  profileTab=tab;
  document.querySelectorAll('.pv-tab').forEach((t,i)=>t.classList.toggle('on',(i===0&&tab==='favorites')||(i===1&&tab==='watchlist')));
  renderProfileMap(mySaves);
}

async function togglePrivacy(){
  if(!session)return;
  const isPublic=document.getElementById('pv-privacy-toggle').dataset.public==='true';
  try{const r=await fetchWithAuth(`${API}/settings`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({maps_public:!isPublic})});if(!r)return;const data=await r.json();const toggle=document.getElementById('pv-privacy-toggle'),label=document.getElementById('pv-privacy-label');toggle.textContent=data.maps_public?'público':'privado';toggle.className=data.maps_public?'public':'';toggle.dataset.public=data.maps_public;label.textContent=data.maps_public?'visible':'solo tú';}
  catch(e){showToast('error al actualizar privacidad');}
}

function shareProfile(){
  if(!session)return;
  const url=new URL(window.location);url.searchParams.set('profile',session.user.id);
  navigator.clipboard.writeText(url.toString()).then(()=>showToast('enlace copiado')).catch(()=>showToast(url.toString()));
}

function closeProfile(){
  document.getElementById('profile-view').classList.remove('open');
  document.getElementById('pv-canvas-wrap').querySelectorAll('.vnode').forEach(n=>n.remove());
  document.getElementById('pv-svg').innerHTML='';
  const url=new URL(window.location);url.searchParams.delete('profile');window.history.replaceState({},'',url);
}

function openAuthModal(){document.getElementById('auth-err').textContent='';document.getElementById('auth-modal').classList.add('open');}
function closeAuthModal(){document.getElementById('auth-modal').classList.remove('open');}
document.getElementById('auth-modal').onclick=e=>{if(e.target===document.getElementById('auth-modal'))closeAuthModal();};

function toggleAuthMode(){
  authMode=authMode==='login'?'register':'login';
  document.getElementById('auth-modal-title').textContent=authMode==='login'?'entrar':'crear cuenta';
  document.getElementById('auth-submit-btn').textContent=authMode==='login'?'entrar':'crear cuenta';
  document.getElementById('auth-switch').textContent=authMode==='login'?'¿No tienes cuenta? Regístrate':'¿Ya tienes cuenta? Entra';
  document.getElementById('auth-err').textContent='';
}

async function submitAuth(){
  const email=document.getElementById('auth-email').value.trim(),password=document.getElementById('auth-pass').value;
  const errEl=document.getElementById('auth-err');if(!email||!password){errEl.textContent='rellena todos los campos';return;}
  try{
    const r=await fetch(API+(authMode==='login'?'/auth/login':'/auth/register'),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
    const data=await r.json();if(!r.ok){errEl.textContent=data.error;return;}
    if(authMode==='register'&&!data.session){errEl.style.color='rgba(180,255,180,0.7)';errEl.textContent='revisa tu email para confirmar';return;}
    session={access_token:data.access_token,refresh_token:data.refresh_token,user:data.user};
    localStorage.setItem('enc_session',JSON.stringify(session));
    closeAuthModal();updateAuthBtn();await loadMyTags();await loadMySaves();renderAll();
  }catch(e){errEl.textContent='error de conexión';}
}

function logout(){session=null;myTags=[];mySaves=[];localStorage.removeItem('enc_session');updateAuthBtn();closeDetail();closeProfile();renderAll();}

function updateAuthBtn(){
  const btn=document.getElementById('auth-btn'),btnC=document.getElementById('btn-connect');
  if(session){btn.textContent='[ '+session.user.email.split('@')[0]+' ]';btn.classList.add('logged');btnC.classList.add('visible');}
  else{btn.textContent='[ entrar ]';btn.classList.remove('logged');btnC.classList.remove('visible');if(connectMode)cancelConnect();}
}

function startDragNode(e,id){
  e.stopPropagation();isDraggingNode=true;wasDragging=false;
  const p=pieces.find(x=>x.id===id);
  const offX=e.clientX-(p.x*transform.scale+transform.x),offY=e.clientY-(p.y*transform.scale+transform.y);
  const move=mv=>{wasDragging=true;p.x=(mv.clientX-offX-transform.x)/transform.scale;p.y=(mv.clientY-offY-transform.y)/transform.scale;positionNodes();renderEdges();};
  const up=()=>{isDraggingNode=false;document.removeEventListener('mousemove',move);document.removeEventListener('mouseup',up);};
  document.addEventListener('mousemove',move);document.addEventListener('mouseup',up);
}

window.addEventListener('resize',()=>{layoutPieces();renderAll();if(isMobile())transform={x:0,y:0,scale:1};});

const canvas=document.getElementById('canvas');
let isPanning=false,panX0,panY0,tx0,ty0;
canvas.addEventListener('mousedown',e=>{if(isDraggingNode||isMobile()||connectMode)return;isPanning=true;panX0=e.clientX;panY0=e.clientY;tx0=transform.x;ty0=transform.y;canvas.style.cursor='crosshair';});
window.addEventListener('mousemove',e=>{if(!isPanning)return;transform.x=tx0+(e.clientX-panX0);transform.y=ty0+(e.clientY-panY0);positionNodes();renderEdges();});
window.addEventListener('mouseup',()=>{isPanning=false;canvas.style.cursor='';});
canvas.addEventListener('wheel',e=>{if(isMobile())return;e.preventDefault();const f=e.deltaY<0?1.1:0.91,r=canvas.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;transform.x=mx-(mx-transform.x)*f;transform.y=my-(my-transform.y)*f;transform.scale=Math.min(Math.max(transform.scale*f,0.2),4);positionNodes();renderEdges();},{passive:false});
canvas.addEventListener('mousemove',e=>updateConnectLine(e));

let touch0=null;
canvas.addEventListener('touchstart',e=>{if(e.touches.length===1)touch0={x:e.touches[0].clientX,y:e.touches[0].clientY,tx:transform.x,ty:transform.y};});
canvas.addEventListener('touchmove',e=>{if(touch0&&e.touches.length===1){if(isMobile()){transform.y=touch0.ty+(e.touches[0].clientY-touch0.y);}else{transform.x=touch0.tx+(e.touches[0].clientX-touch0.x);transform.y=touch0.ty+(e.touches[0].clientY-touch0.y);}positionNodes();renderEdges();}});
canvas.addEventListener('touchend',()=>{touch0=null;});

const pvWrap=document.getElementById('pv-canvas-wrap');
let pvPanning=false,pvPanX0,pvPanY0,pvTx0,pvTy0;
pvWrap.addEventListener('mousedown',e=>{if(isDraggingNode)return;pvPanning=true;pvPanX0=e.clientX;pvPanY0=e.clientY;pvTx0=pvTransform.x;pvTy0=pvTransform.y;pvWrap.style.cursor='crosshair';});
window.addEventListener('mousemove',e=>{if(!pvPanning)return;pvTransform.x=pvTx0+(e.clientX-pvPanX0);pvTransform.y=pvTy0+(e.clientY-pvPanY0);pvPieces.forEach(p=>{const el=document.getElementById('pvnode-'+p.id);if(el){el.style.left=(p.pvx*pvTransform.scale+pvTransform.x)+'px';el.style.top=(p.pvy*pvTransform.scale+pvTransform.y)+'px';}});renderProfileEdges();});
window.addEventListener('mouseup',()=>{pvPanning=false;pvWrap.style.cursor='';});
pvWrap.addEventListener('wheel',e=>{e.preventDefault();const f=e.deltaY<0?1.1:0.91,r=pvWrap.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;pvTransform.x=mx-(mx-pvTransform.x)*f;pvTransform.y=my-(my-pvTransform.y)*f;pvTransform.scale=Math.min(Math.max(pvTransform.scale*f,0.2),4);pvPieces.forEach(p=>{const el=document.getElementById('pvnode-'+p.id);if(el){el.style.left=(p.pvx*pvTransform.scale+pvTransform.x)+'px';el.style.top=(p.pvy*pvTransform.scale+pvTransform.y)+'px';el.style.transform=`scale(${pvTransform.scale})`;}});renderProfileEdges();},{passive:false});

function zoom(f){if(isMobile())return;const cx=canvas.clientWidth/2,cy=canvas.clientHeight/2;transform.x=cx-(cx-transform.x)*f;transform.y=cy-(cy-transform.y)*f;transform.scale=Math.min(Math.max(transform.scale*f,0.2),4);positionNodes();renderEdges();}
function resetView(){if(isMobile()){transform={x:0,y:0,scale:1};layoutPieces();positionNodes();renderEdges();}else{transform={x:80,y:30,scale:1};positionNodes();renderEdges();}}
function updateStatus(){const tags=new Set(pieces.flatMap(p=>p.tags)),ut=new Set(userTags.map(t=>t.tag));document.getElementById('st-pieces').textContent=pieces.length;document.getElementById('st-otags').textContent=tags.size;document.getElementById('st-utags').textContent=ut.size;}
function showToast(msg){const el=document.getElementById('error-toast');el.textContent=msg;el.style.display='block';setTimeout(()=>el.style.display='none',5000);}
function selectPiece(id){selectedId=selectedId===id?null:id;renderAll();if(selectedId)showDetail(selectedId);}

let connectMode=false,connectOriginId=null;
function toggleConnectMode(){connectMode=!connectMode;document.getElementById('btn-connect').classList.toggle('active',connectMode);document.body.classList.toggle('connect-mode',connectMode);if(!connectMode)resetConnectState();}
function resetConnectState(){connectOriginId=null;document.querySelectorAll('.vnode.connect-origin').forEach(n=>n.classList.remove('connect-origin'));document.getElementById('connect-svg').innerHTML='';document.getElementById('connect-popup').classList.remove('open');}
function cancelConnect(){connectMode=false;document.getElementById('btn-connect').classList.remove('active');document.body.classList.remove('connect-mode');resetConnectState();}

function handleConnectClick(e,pieceId){
  if(!connectMode)return false;e.stopPropagation();
  if(!connectOriginId){connectOriginId=pieceId;document.getElementById('node-'+pieceId).classList.add('connect-origin');return true;}
  if(connectOriginId===pieceId){document.getElementById('node-'+pieceId).classList.remove('connect-origin');connectOriginId=null;document.getElementById('connect-svg').innerHTML='';return true;}
  const pA=pieces.find(p=>p.id===connectOriginId),pB=pieces.find(p=>p.id===pieceId);if(!pA||!pB)return true;
  const caA=nodeCenter(pA),caB=nodeCenter(pB),midX=(caA.x+caB.x)/2,midY=(caA.y+caB.y)/2;
  const rect=canvas.getBoundingClientRect();
  document.getElementById('cp-pieces').textContent='"'+pA.title+'"  ↔  "'+pB.title+'"';
  document.getElementById('cp-tag-input').value='';
  const popup=document.getElementById('connect-popup');
  popup.style.left=Math.min(rect.left+midX,window.innerWidth-220)+'px';popup.style.top=Math.min(rect.top+midY,window.innerHeight-160)+'px';
  popup.classList.add('open');popup.dataset.targetId=pieceId;
  setTimeout(()=>document.getElementById('cp-tag-input').focus(),50);return true;
}

async function confirmConnect(){
  const tag=document.getElementById('cp-tag-input').value.trim().toLowerCase();if(!tag){document.getElementById('cp-tag-input').focus();return;}
  const targetId=document.getElementById('connect-popup').dataset.targetId,originId=connectOriginId;if(!originId||!targetId)return;
  document.getElementById('connect-popup').classList.remove('open');
  try{
    const [r1,r2]=await Promise.all([fetchWithAuth(`${API}/user-tags`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({piece_id:originId,tag})}),fetchWithAuth(`${API}/user-tags`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({piece_id:targetId,tag})})]);
    const d1=r1?await r1.json():null,d2=r2?await r2.json():null;
    if(d1&&r1.ok)myTags.unshift(d1);if(d2&&r2.ok)myTags.unshift(d2);
    await loadUserTags();resetConnectState();renderAll();showToast('conexión creada: '+tag);
  }catch(e){showToast('error al crear conexión');resetConnectState();}
}

function updateConnectLine(e){
  if(!connectMode||!connectOriginId)return;
  const rect=canvas.getBoundingClientRect(),mx=e.clientX-rect.left,my=e.clientY-rect.top;
  const p=pieces.find(x=>x.id===connectOriginId);if(!p)return;
  const ca=nodeCenter(p),svg=document.getElementById('connect-svg');svg.innerHTML='';
  const line=document.createElementNS('http://www.w3.org/2000/svg','line');
  line.setAttribute('x1',ca.x);line.setAttribute('y1',ca.y);line.setAttribute('x2',mx);line.setAttribute('y2',my);
  line.setAttribute('stroke','rgba(180,170,255,0.5)');line.setAttribute('stroke-width','1');line.setAttribute('stroke-dasharray','5 4');
  svg.appendChild(line);
}

boot();
